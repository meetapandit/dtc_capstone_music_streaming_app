# =============================================================================
# Flink Kubernetes Service Account
# Annotated for Workload Identity → maps to GCP flink-pipeline-sa
# Matches the IAM binding in terraform/modules/iam/main.tf
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-sa
  namespace: flink
  annotations:
    # Replace with actual flink-pipeline-sa email from: terraform output flink_sa_email
    iam.gke.io/gcp-service-account: flink-pipeline-sa@dtc-capstone-491118.iam.gserviceaccount.com
---
# RBAC — lets Flink operator manage pods/services in the flink namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-role
  namespace: flink
rules:
  - apiGroups: [""]
    resources: [pods, services, configmaps, events]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, replicasets]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-role-binding
  namespace: flink
subjects:
  - kind: ServiceAccount
    name: flink-sa
    namespace: flink
roleRef:
  kind: Role
  name: flink-role
  apiGroup: rbac.authorization.k8s.io
